name: Class Checker

# 12 quick checks per day: one single check every 2 hours. Each run does one
# scrape and exits — no long-running loops. GitHub's cron is best-effort, so
# some fires may land late or drop; the next one is never far behind.

on:
  schedule:
    # Every 2 hours at :23 past the hour (off the congested :00 mark).
    - cron: "23 */2 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for open seats
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python Main.py --once

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            last_check.png
            class_checker.log
          if-no-files-found: ignore
          retention-days: 3
