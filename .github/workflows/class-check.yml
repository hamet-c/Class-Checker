name: Class Checker

on:
  schedule:
    # Every 5 minutes, offset to :01/:06/:11/... — the exact 5-minute marks
    # (:00, :05, ...) are GitHub's most congested slots and scheduled runs
    # get dropped under load. Still best-effort: expect ~5-20 min between runs.
    - cron: "1-56/5 * * * *"
  workflow_dispatch:
    inputs:
      test_notification:
        description: "Also send a test Discord ping to verify the webhook"
        type: boolean
        default: false

# Never let two checks overlap; a late-dispatched run just queues.
concurrency:
  group: class-check
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for open seats
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TEST_NOTIFY: ${{ inputs.test_notification }}
        run: python Main.py --once

      - name: Upload debug artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ github.run_id }}
          path: |
            last_check.png
            class_checker.log
          if-no-files-found: ignore
          retention-days: 3
